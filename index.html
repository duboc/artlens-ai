<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>AI Leadership Academy</title>

    <!-- Google Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Google Sans Text', 'Google Sans', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              serif: ['Google Sans', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              // Black + Google Blue Palette
              surface: {
                DEFAULT: '#1a1a1a',
                variant: '#242424',
                dim: 'rgba(26, 26, 26, 0.85)',
              },
              primary: {
                DEFAULT: '#4285F4',
                dark: '#3367D6',
              },
              onPrimary: '#ffffff',
              secondary: {
                DEFAULT: '#9aa0a6',
                dim: '#5f6368',
              },
              accent: {
                DEFAULT: '#4285F4',
              },
              error: '#ea4335',
              success: '#34a853',
              gRed: '#EA4335',
              gYellow: '#FBBC04',
              gGreen: '#34A853',
              gBlue: '#4285F4',
            },
            spacing: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1)',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'reveal': 'reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'reveal-delay-1': 'reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards',
              'reveal-delay-2': 'reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards',
              'reveal-delay-3': 'reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards',
              'scan-line': 'scanLine 2s ease-in-out infinite',
              'glow-pulse': 'glowPulse 3s ease-in-out infinite',
              'shimmer': 'shimmer 3s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              reveal: {
                '0%': { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scanLine: {
                '0%': { transform: 'translateY(-100%)' },
                '50%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(-100%)' },
              },
              glowPulse: {
                '0%, 100%': { boxShadow: '0 0 20px rgba(66, 133, 244, 0.15)' },
                '50%': { boxShadow: '0 0 40px rgba(66, 133, 244, 0.3)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% center' },
                '100%': { backgroundPosition: '200% center' },
              },
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --bg: #000000;
        --surface: #1a1a1a;
        --surface-variant: #242424;
        --primary: #4285F4;
        --primary-dim: rgba(66, 133, 244, 0.12);
        --on-primary: #ffffff;
        --secondary: #9aa0a6;
        --text: #e8eaed;
        --error: #ea4335;
        --success: #34a853;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        overflow: hidden;
        font-family: 'Google Sans Text', 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Subtle noise texture overlay */
      .noise-bg::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        opacity: 0.02;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 256px 256px;
      }

      /* Hide scrollbar but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Google 4-color shimmer text effect */
      .text-shimmer {
        background: linear-gradient(
          110deg,
          #4285F4 0%,
          #EA4335 25%,
          #FBBC04 50%,
          #34A853 75%,
          #4285F4 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 4s ease-in-out infinite;
      }

      /* Google rainbow gradient bar */
      .google-gradient {
        background: linear-gradient(90deg, #EA4335 0%, #EA4335 25%, #FBBC04 25%, #FBBC04 50%, #34A853 50%, #34A853 75%, #4285F4 75%, #4285F4 100%);
      }

      /* Smooth Google gradient */
      .google-gradient-smooth {
        background: linear-gradient(90deg, #EA4335, #FBBC04, #34A853, #4285F4);
      }

      /* Blue border glow */
      .border-gold-glow {
        border-color: rgba(66, 133, 244, 0.2);
        box-shadow: 0 0 20px rgba(66, 133, 244, 0.05);
      }

      /* Glass effect */
      .warm-glass {
        background: rgba(26, 26, 26, 0.9);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(66, 133, 244, 0.1);
      }

      /* Capture flash effect */
      .capture-flash {
        animation: captureFlash 0.4s ease-out forwards;
      }

      @keyframes captureFlash {
        0% { opacity: 0.6; }
        100% { opacity: 0; }
      }

      /* dvh fallback for older browsers */
      .h-dvh {
        height: 100vh;
        height: 100dvh;
      }

      /* Safe area padding helpers */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top, 0px);
      }

      /* Reduced motion: disable blur and animations for low-end devices */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .warm-glass {
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          background: rgba(26, 26, 26, 0.95);
        }
        .noise-bg::before {
          display: none;
        }
      }

      /* Prevent iOS text size adjustment */
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* Ensure inputs never trigger iOS zoom (minimum 16px) */
      input, textarea, select {
        font-size: 16px !important;
      }

      /* Touch target helper */
      .touch-target {
        min-height: 44px;
        min-width: 44px;
      }

      /* Override for inline/decorative elements */
      .min-h-auto {
        min-height: auto !important;
        min-width: auto !important;
      }
    </style>
</head>
  <body class="noise-bg">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
